<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Owner 1</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="Adminowner1.js" defer></script>
<style>
  body {font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
</style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- Mobile top bar -->
  <header class="lg:hidden fixed top-0 left-0 right-0 flex items-center justify-between bg-white border-b border-gray-200 px-4 py-3 z-30">
    <button id="menuBtn" class="text-gray-600">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <div class="flex items-center gap-1.5 font-bold text-green-800 text-lg">
      <img src="inventralogo.png" class="h-10">
    </div>
    <img src="https://i.pravatar.cc/32?img=47" class="h-8 w-8 rounded-full" alt="">
  </header>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 bg-white border-r border-gray-200 flex flex-col z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <div class="flex items-center gap-2 px-6 py-5 font-bold text-green-800 text-xl">
            <img src="inventralogo.png" class="h-12">
    </div>

    <nav class="flex-1 px-3 space-y-1">
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium">
        <span class="w-5">▦</span> Dashboard
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium">
        <span class="w-5">📦</span> Inventory
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-gray-100 text-gray-900 text-sm font-semibold">
        <span class="w-5">🛒</span> Sales
      </a>
      <a href="#" class="flex items-center justify-between px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium">
        <span class="flex items-center gap-3"><span class="w-5">⚠️</span> Alert</span>
        <span class="bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">10</span>
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium">
        <span class="w-5">📈</span> Analytics
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium">
        <span class="w-5">🔄</span> Reconcilation
      </a>

      <div class="border-t border-gray-100 my-3"></div>

      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium">
        <span class="w-5">👤</span> Staff
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-medium">
        <span class="w-5">⚙️</span> Settings
      </a>
    </nav>

    <div class="border-t border-gray-100 p-4 flex items-center gap-3">
      <div class="relative">
        <img src="https://i.pravatar.cc/40?img=47" class="h-10 w-10 rounded-full" alt="">
        <span class="absolute bottom-0 right-0 h-2.5 w-2.5 bg-green-500 border-2 border-white rounded-full"></span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-gray-800 truncate">Olamide Ola</p>
        <p class="text-xs text-gray-400 truncate">AdeMart Enterprise</p>
      </div>
      <button class="text-gray-400 hover:text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>
  </aside>
  <div id="overlay" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden"></div>

  <!-- Main -->
  <main class="flex-1 min-w-0 pt-14 lg:pt-0">

    <!-- Top bar (desktop) -->
    <div class="hidden lg:flex items-center gap-4 px-6 py-4 border-b border-gray-200 bg-white">
      <div class="flex-1 max-w-2xl relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
        </svg>
        <input type="text" placeholder="Search products, SKU, invoices, suppliers..." class="w-full bg-gray-100 rounded-full pl-10 pr-10 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-600">
        <svg class="absolute right-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V6a2 2 0 012-2h2M4 16v2a2 2 0 002 2h2m8-16h2a2 2 0 012 2v2m-2 12h2a2 2 0 002-2v-2" />
        </svg>
      </div>
      <div class="flex-1"></div>
      <button class="relative text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
      </button>
      <div class="flex items-center gap-3">
        <img src="https://i.pravatar.cc/36?img=47" class="h-9 w-9 rounded-full" alt="">
        <div class="text-sm leading-tight">
          <p class="font-semibold text-gray-800">Olamide Ola</p>
          <p class="text-gray-400 text-xs">Store Owner</p>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>

    <!-- Page content -->
    <div class="p-4 sm:p-6">

      <!-- Header row -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
        <h1 class="text-xl sm:text-2xl font-bold text-gray-800">New Sales</h1>

        <div class="flex flex-1 sm:flex-none items-center gap-3 sm:ml-auto">
          <div class="flex-1 sm:w-64 relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
            </svg>
            <input id="productSearch" type="text" placeholder="Search products" class="w-full bg-gray-100 rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600">
          </div>
          <button id="filterBtn" class="h-9 w-9 flex items-center justify-center rounded-lg bg-gray-100 text-gray-500 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h18M6 8h12M10 12h4" />
            </svg>
          </button>
        </div>

        <div class="flex items-center gap-2">
          <button id="historyBtn" class="border border-gray-300 text-gray-600 text-sm font-medium px-4 py-2 rounded-lg hover:bg-gray-50 whitespace-nowrap">Sale History</button>
          <button id="newSaleBtn" class="flex items-center gap-1.5 bg-green-700 hover:bg-green-800 text-white text-sm font-semibold px-4 py-2 rounded-lg whitespace-nowrap">
            <span class="text-base leading-none">+</span> New Sale
          </button>
        </div>
      </div>

      <!-- Filter dropdown -->
      <div id="filterPanel" class="hidden mb-4">
        <select id="statusFilter" class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600">
          <option value="">All status</option>
          <option value="In stock">In stock</option>
          <option value="Low stock">Low stock</option>
          <option value="Out of stock">Out of stock</option>
          <option value="Expired">Expired</option>
        </select>
      </div>

      <!-- Table (md and up) -->
      <div class="hidden md:block bg-white rounded-xl border border-gray-200 overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-gray-400 border-b border-gray-100">
              <th class="font-medium px-4 py-3">Inventory</th>
              <th class="font-medium px-4 py-3">SKU</th>
              <th class="font-medium px-4 py-3">Price</th>
              <th class="font-medium px-4 py-3">Stock</th>
              <th class="font-medium px-4 py-3">Status</th>
              <th class="font-medium px-4 py-3">Qty</th>
            </tr>
          </thead>
          <tbody id="productTableBody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>

      <!-- Cards (mobile) -->
      <div id="productCards" class="md:hidden space-y-3"></div>
    </div>
  </main>
</body>
</html>
