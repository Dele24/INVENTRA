<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin owner 3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="Adminowner3.js" defer></script>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .pop-in { animation: popIn 0.35s ease-out; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes checkDraw { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
  .check-path { stroke-dasharray: 24; animation: checkDraw 0.5s ease-out 0.2s forwards; stroke-dashoffset: 24; }
</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
 
  <!-- Backdrop -->
  <div id="backdrop" class="fixed inset-0 bg-black/50 fade-in flex items-center justify-center p-4 z-50">
 
    <!-- Modal -->
    <div class="pop-in bg-white rounded-2xl shadow-2xl w-full max-w-md sm:max-w-lg p-5 sm:p-8 max-h-[95vh] overflow-y-auto">
 
      <!-- Success Icon -->
      <div class="flex justify-center mb-4">
        <div class="bg-green-100 rounded-full h-16 w-16 sm:h-20 sm:w-20 flex items-center justify-center">
          <div class="bg-green-600 rounded-full h-10 w-10 sm:h-12 sm:w-12 flex items-center justify-center">
            <svg viewBox="0 0 24 24" class="h-6 w-6 sm:h-7 sm:w-7" fill="none">
              <path class="check-path" d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
 
      <!-- Title -->
      <h2 class="text-center text-lg sm:text-xl font-bold text-gray-800">Sale Logged</h2>
      <p class="text-center text-sm sm:text-base text-gray-500 mt-1 mb-5">Transaction recorded successfully</p>
 
      <!-- Details Card -->
      <div class="bg-gray-50 rounded-xl divide-y divide-gray-200 overflow-hidden">
        <div class="flex justify-between items-center px-4 py-3">
          <span class="text-sm text-gray-500">Transaction ID</span>
          <span id="txnId" class="text-sm font-medium text-gray-800">SRD-1043</span>
        </div>
        <div class="flex justify-between items-center px-4 py-3">
          <span class="text-sm text-gray-500">Date &amp; Time</span>
          <span id="txnDate" class="text-sm font-medium text-gray-800">Jun 7, 2026 - 9:41am</span>
        </div>
        <div class="flex justify-between items-center px-4 py-3">
          <span class="text-sm text-gray-500">Logged by</span>
          <span id="txnUser" class="text-sm font-medium text-gray-800">Adaeze Okafor</span>
        </div>
        <div class="flex justify-between items-center px-4 py-3">
          <span class="text-sm text-gray-500">Payment method</span>
          <span id="txnMethod" class="text-xs font-semibold text-green-700 bg-green-100 px-3 py-1 rounded-full">Cash</span>
        </div>
        <div class="flex justify-between items-center px-4 py-3 bg-gray-100">
          <span class="text-sm sm:text-base font-bold text-gray-800">Total</span>
          <span id="txnTotal" class="text-base sm:text-lg font-bold text-green-700">₦13,630</span>
        </div>
      </div>
 
      <!-- Actions -->
      <div class="mt-6 space-y-3">
        <button id="newSaleBtn" class="w-full flex items-center justify-center gap-2 bg-green-700 hover:bg-green-800 active:scale-[0.98] text-white font-semibold text-sm sm:text-base py-3 rounded-lg transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          Start New Sale
        </button>
        <button id="viewSalesBtn" class="w-full flex items-center justify-center gap-2 border border-green-700 text-green-700 hover:bg-green-50 active:scale-[0.98] font-semibold text-sm sm:text-base py-3 rounded-lg transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          View All Sales
        </button>
      </div>
    </div>
  </div>
 
  <!-- All Sales view (hidden by default) -->
  <div id="salesView" class="hidden fixed inset-0 bg-gray-100 p-4 sm:p-8 overflow-y-auto z-40">
    <div class="max-w-3xl mx-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg sm:text-2xl font-bold text-gray-800">All Sales</h2>
        <button id="closeSalesBtn" class="text-sm font-medium text-green-700 hover:underline">Close</button>
      </div>
      <div class="bg-white rounded-xl shadow divide-y divide-gray-200" id="salesList"></div>
    </div>
  </div>
 
  <!-- New Sale view (hidden by default) -->
  <div id="newSaleView" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-5 sm:p-8 pop-in">
      <h2 class="text-lg sm:text-xl font-bold text-gray-800 mb-4">New Sale</h2>
      <form id="newSaleForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Item / Description</label>
          <input required id="itemInput" type="text" placeholder="e.g. Bag of rice" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Amount (₦)</label>
          <input required id="amountInput" type="number" min="1" placeholder="13630" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Payment Method</label>
          <select id="methodInput" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-600">
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
            <option value="Transfer">Transfer</option>
          </select>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" id="cancelNewSale" class="flex-1 border border-gray-300 text-gray-600 font-semibold py-3 rounded-lg hover:bg-gray-50">Cancel</button>
          <button type="submit" class="flex-1 bg-green-700 hover:bg-green-800 text-white font-semibold py-3 rounded-lg">Log Sale</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
